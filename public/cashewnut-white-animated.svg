<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 90" shape-rendering="crispEdges">
  <defs>
    <style>
      @keyframes popIn {
        0% { opacity: 0; transform: translateY(15px); }
        15%, 85% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-15px); }
      }
      .anim {
        opacity: 0;
        animation: popIn 3.5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
      }
      /* Staggered animation delays for a smooth left-to-right wave */
      .d1 { animation-delay: 0.1s; }
      .d2 { animation-delay: 0.2s; }
      .d3 { animation-delay: 0.3s; }
      .d4 { animation-delay: 0.4s; }
      .d5 { animation-delay: 0.5s; }
      .d6 { animation-delay: 0.6s; }
      .d7 { animation-delay: 0.7s; } 
      .d8 { animation-delay: 0.8s; }
      .d9 { animation-delay: 0.9s; }
    </style>
  </defs>

  <g fill="#FFFFFF" transform="translate(20, 20)">
    
    <g transform="translate(0, 0)">
      <g class="anim d1">
        <rect x="0" y="0" width="30" height="10"/>
        <rect x="0" y="10" width="10" height="30"/>
        <rect x="0" y="40" width="30" height="10"/>
      </g>
    </g>
    
    <g transform="translate(40, 0)">
      <g class="anim d2">
        <rect x="0" y="0" width="30" height="10"/>
        <rect x="0" y="10" width="10" height="40"/>
        <rect x="20" y="10" width="10" height="40"/>
        <rect x="0" y="25" width="30" height="10"/>
      </g>
    </g>
    
    <g transform="translate(80, 0)">
      <g class="anim d3">
        <rect x="0" y="0" width="30" height="10"/>
        <rect x="0" y="10" width="10" height="15"/>
        <rect x="0" y="20" width="30" height="10"/>
        <rect x="20" y="25" width="10" height="15"/>
        <rect x="0" y="40" width="30" height="10"/>
      </g>
    </g>
    
    <g transform="translate(120, 0)">
      <g class="anim d4">
        <rect x="0" y="0" width="10" height="50"/>
        <rect x="20" y="0" width="10" height="50"/>
        <rect x="0" y="20" width="30" height="10"/>
      </g>
    </g>
    
    <g transform="translate(160, 0)">
      <g class="anim d5">
        <rect x="0" y="0" width="30" height="10"/>
        <rect x="0" y="10" width="10" height="30"/>
        <rect x="0" y="20" width="25" height="10"/>
        <rect x="0" y="40" width="30" height="10"/>
      </g>
    </g>
    
    <g transform="translate(200, 0)">
      <g class="anim d6">
        <rect x="0" y="0" width="10" height="50"/>
        <rect x="40" y="0" width="10" height="50"/>
        <rect x="20" y="20" width="10" height="30"/>
        <rect x="10" y="40" width="30" height="10"/>
      </g>
    </g>

    <g transform="translate(260, 0)">
      <g class="anim d7">
        <rect x="0" y="0" width="30" height="10"/>
        <rect x="0" y="10" width="10" height="40"/>
        <rect x="20" y="10" width="10" height="40"/>
      </g>
    </g>
    
    <g transform="translate(300, 0)">
      <g class="anim d8">
        <rect x="0" y="0" width="10" height="40"/>
        <rect x="20" y="0" width="10" height="40"/>
        <rect x="0" y="40" width="30" height="10"/>
      </g>
    </g>
    
    <g transform="translate(340, 0)">
      <g class="anim d9">
        <rect x="0" y="0" width="30" height="10"/>
        <rect x="10" y="10" width="10" height="40"/>
      </g>
    </g>

  </g>
</svg>